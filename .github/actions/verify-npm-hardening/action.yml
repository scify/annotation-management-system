# Verifies supply chain security settings before npm ci.
# Place AFTER checkout and BEFORE npm ci.
#
# Usage:
#
#   steps:
#     - uses: actions/checkout@v6
#     - uses: ./.github/actions/verify-npm-hardening
#     - run: npm ci
#
# Inputs:
#   min-age (optional, default: 7)
#     Minimum acceptable min-release-age value in days. Must be >= 7.

name: Verify npm supply chain hardening
description: Checks .npmrc settings and lockfile presence before npm ci

inputs:
    min-age:
        description: Minimum acceptable min-release-age value in days
        required: false
        default: '7'

runs:
    using: composite
    steps:
        - name: Check required files
          shell: bash
          run: |
              errors=0

              if [ ! -f .npmrc ]; then
                echo "::error::.npmrc is missing. See .github/actions/verify-npm-hardening/README.md for setup instructions."
                errors=$((errors + 1))
              fi

              if [ ! -f package-lock.json ]; then
                echo "::error::package-lock.json is missing. Run npm install locally, commit the lockfile, and push."
                errors=$((errors + 1))
              fi

              if [ "$errors" -gt 0 ]; then
                exit 1
              fi

              echo "Required files present: .npmrc, package-lock.json"

        - name: Verify .npmrc hardening settings
          shell: bash
          env:
              MIN_AGE: ${{ inputs.min-age }}
          run: |
              if ! [ "$MIN_AGE" -ge 7 ] 2>/dev/null; then
                echo "::error::Invalid min-age input: '${MIN_AGE}'. Must be a number >= 7."
                exit 1
              fi

              errors=0

              if ! grep -q '^ignore-scripts=true$' .npmrc; then
                echo "::error::Missing .npmrc setting: ignore-scripts=true"
                errors=$((errors + 1))
              fi

              if ! grep -q '^engine-strict=true$' .npmrc; then
                echo "::error::Missing .npmrc setting: engine-strict=true"
                errors=$((errors + 1))
              fi

              age=$(grep '^min-release-age=' .npmrc | cut -d= -f2)
              if ! [ "$age" -ge "$MIN_AGE" ] 2>/dev/null; then
                echo "::error::Missing or invalid .npmrc setting: min-release-age must be a number >= ${MIN_AGE}"
                errors=$((errors + 1))
              fi

              if [ "$errors" -gt 0 ]; then
                echo "::error::Supply chain hardening check failed. Do not remove these settings."
                exit 1
              fi

              echo "Settings verified: ignore-scripts, engine-strict, min-release-age=${age} days"

        - name: Check for non-registry dependencies in package.json
          shell: bash
          run: |
              # Git-hosted and URL-based dependencies bypass min-release-age
              # entirely because they are not fetched from the npm registry.
              git_deps=$(node -p "
                const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
                const fields = ['dependencies', 'devDependencies', 'optionalDependencies', 'peerDependencies'];
                const hits = [];
                fields.forEach(f => {
                  const deps = pkg[f] || {};
                  Object.entries(deps).forEach(([name, spec]) => {
                    if (/^(git[+:]|github:|https?:|file:)/.test(spec) || spec.includes('/') && !spec.startsWith('@'))
                      hits.push(f + ' | ' + name + ': ' + spec);
                  });
                });
                hits.length ? hits.join('\n') : '';
              ")

              if [ -n "$git_deps" ]; then
                echo "::error::Non-registry dependencies detected. These bypass min-release-age:"
                echo "$git_deps" | while IFS= read -r line; do
                  echo "::error::  $line"
                done
                exit 1
              fi

              echo "All package.json dependencies use the npm registry."

        - name: Check for non-registry URLs in lockfile
          shell: bash
          run: |
              # A tampered lockfile could resolve packages to non-registry
              # sources even if package.json looks clean.
              non_registry=$(node -p "
                const lock = JSON.parse(require('fs').readFileSync('package-lock.json', 'utf8'));
                const packages = lock.packages || {};
                const hits = [];
                Object.entries(packages).forEach(([path, meta]) => {
                  const r = meta.resolved || '';
                  if (r && !/^https?:\/\/registry\.npmjs\.org\//.test(r) && !/^https?:\/\/registry\.npm\./.test(r) && path !== '')
                    hits.push(path + ' -> ' + r);
                });
                hits.length ? hits.join('\n') : '';
              ")

              if [ -n "$non_registry" ]; then
                echo "::error::Lockfile contains entries resolved outside the npm registry:"
                echo "$non_registry" | while IFS= read -r line; do
                  echo "::error::  $line"
                done
                exit 1
              fi

              echo "All lockfile entries resolve to the npm registry."
