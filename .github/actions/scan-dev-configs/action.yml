# Scans dev tool config directories for signs of compromise.
# Place AFTER checkout, runs independently of npm hardening.
#
# Usage:
#
#   steps:
#     - uses: actions/checkout@v6
#     - uses: ./.github/actions/scan-dev-configs
#
# Checks:
#   1. No executable script files in dev tool directories
#   2. No suspicious commands in config files

name: Scan dev tool configs
description: Checks .vscode, .claude, .cursor, and .idea directories for suspicious content

runs:
    using: composite
    steps:
        - name: Detect dev tool directories
          id: detect
          shell: bash
          run: |
              dirs=""
              for d in .vscode .claude .cursor .idea; do
                [ -d "$d" ] && dirs="$dirs $d"
              done

              if [ -z "$dirs" ]; then
                echo "No dev tool directories found in repository."
                echo "found=false" >> "$GITHUB_OUTPUT"
              else
                echo "Scanning:$dirs"
                echo "found=true" >> "$GITHUB_OUTPUT"
                echo "dirs=$dirs" >> "$GITHUB_OUTPUT"
              fi

        - name: Check for executable script files
          if: steps.detect.outputs.found == 'true'
          shell: bash
          env:
              DIRS: ${{ steps.detect.outputs.dirs }}
          run: |
              # Dev tool directories should not contain executable scripts.
              js_files=$(find $DIRS -type f \( -name "*.js" -o -name "*.mjs" -o -name "*.cjs" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" -o -name "*.mts" -o -name "*.cts" \) 2>/dev/null)

              if [ -n "$js_files" ]; then
                echo "::error::Executable script files found in dev tool directories:"
                echo "$js_files" | while IFS= read -r file; do
                  echo "::error::  $file"
                done
                exit 1
              fi

              echo "No executable script files found."

        - name: Check for suspicious commands
          if: steps.detect.outputs.found == 'true'
          shell: bash
          env:
              DIRS: ${{ steps.detect.outputs.dirs }}
          run: |
              # Execution and network patterns that have no business in
              # editor or tool configuration files.
              suspicious='curl|wget|Invoke-WebRequest|iwr|bash -c|sh -c|powershell|pwsh|certutil|base64|chmod \+x|nc |ncat|socat|python -c|node -e|eval\(|npx'
              suspect_files=$(grep -Erl "$suspicious" $DIRS 2>/dev/null)

              if [ -n "$suspect_files" ]; then
                echo "::error::Suspicious commands found in dev tool configs:"
                echo "$suspect_files" | while IFS= read -r file; do
                  echo "::error::  $file"
                  grep -En "$suspicious" "$file" | while IFS= read -r match; do
                    echo "::error::    $match"
                  done
                done
                exit 1
              fi

              echo "No suspicious commands found."
